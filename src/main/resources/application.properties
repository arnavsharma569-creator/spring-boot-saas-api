spring.application.name=authsystem

# MySQL Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/authsystem}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=${JWT_SECRET:changeme_local_only}

# Stripe (test mode)
stripe.api.secret-key=${STRIPE_SECRET_KEY:sk_test_placeholder}
stripe.price.id=${STRIPE_PRICE_ID:price_placeholder}
stripe.success.url=${STRIPE_SUCCESS_URL:http://localhost:8080/dashboard.html?upgraded=true}
stripe.cancel.url=${STRIPE_CANCEL_URL:http://localhost:8080/upgrade.html?canceled=true}